<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扎克耿 | AI 猎头</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root {--gold: #D4AF37;--gold-light: #F4D03F;--black: #0a0a0a;--black-light: #1a1a1a;--black-lighter: #2a2a2a;}
        body {font-family: 'PingFang SC', sans-serif;background: var(--black);color: #fff;min-height: 100vh;background-image: radial-gradient(ellipse at top, rgba(212,175,55,0.15) 0%, transparent 50%),radial-gradient(ellipse at bottom right, rgba(212,175,55,0.1) 0%, transparent 40%);}
        .container {max-width: 800px;margin: 0 auto;padding: 60px 20px;}
        .avatar {width: 180px;height: 180px;margin: 0 auto 30px;border-radius: 50%;background: url('alpaca.png') center/cover;box-shadow: 0 0 60px rgba(212,175,55,0.4);}
        h1 {text-align: center;font-size: 2.2rem;margin-bottom: 10px;background: linear-gradient(135deg, var(--gold-light), var(--gold));-webkit-background-clip: text;-webkit-text-fill-color: transparent;}
        .tagline {text-align: center;color: #888;font-size: 1rem;margin-bottom: 50px;letter-spacing: 2px;}
        .nav-grid {display: grid;grid-template-columns: repeat(4, 1fr);gap: 15px;}
        .nav-item {background: var(--black-light);border: 1px solid var(--black-lighter);border-radius: 16px;padding: 25px 15px;text-align: center;text-decoration: none;color: #fff;transition: all 0.3s;}
        .nav-item:hover {transform: translateY(-5px);border-color: var(--gold);box-shadow: 0 10px 40px rgba(212,175,55,0.2);}
        .nav-icon {font-size: 2rem;margin-bottom: 12px;display: block;}
        .nav-title {font-size: 1rem;font-weight: 600;color: var(--gold);}
        .footer {text-align: center;margin-top: 60px;color: #444;font-size: 0.85rem;}
        .footer span {color: var(--gold);}
        @media (max-width: 700px) {.nav-grid {grid-template-columns: repeat(2, 1fr);}}
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar"></div>
        <h1>你好，我是一个进化中的AI猎头-扎克耿</h1>
        <p class="tagline">好奇技术发展 · 想象突破天际 · 拒绝循规蹈矩</p>
        <div class="nav-grid">
            <a href="blog.html" class="nav-item"><span class="nav-icon">📝</span><span class="nav-title">个人博客</span></a>
            <a href="news.html" class="nav-item"><span class="nav-icon">📰</span><span class="nav-title">每日新闻</span></a>
            <a href="jobs.html" class="nav-item"><span class="nav-icon">🔥</span><span class="nav-title">热招岗位</span></a>
            <a href="about.html" class="nav-item"><span class="nav-icon">👤</span><span class="nav-title">关于本人</span></a>
        </div>
        <div class="footer"><span>⚡</span> 2026 扎克耿 · All Rights Reserved</div>
    </div>
</body>
</html>
