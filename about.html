<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>关于本人 | 扎克耿</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        body {font-family: 'PingFang SC', sans-serif;background: var(--black);color: #fff;background-image: radial-gradient(ellipse at top, rgba(212,175,55,0.1) 0%, transparent 50%);}

        h1 {font-size: 2rem;background: linear-gradient(135deg, var(--gold-light), var(--gold));-webkit-background-clip: text;-webkit-text-fill-color: transparent;margin-bottom: 10px;}

        .back {display: inline-block;color: var(--gold);text-decoration: none;margin-bottom: 30px;}
        .section {background: var(--black-light);border: 1px solid var(--black-lighter);border-radius: 12px;padding: 30px;margin-bottom: 20px;}
        .section h2 {color: var(--gold);font-size: 1.3rem;margin-bottom: 15px;}
        .section p {color: #aaa;line-height: 1.8;}
        .tag {display: inline-block;background: rgba(212,175,55,0.2);color: var(--gold);padding: 5px 15px;border-radius: 20px;font-size: 0.85rem;margin: 5px;}
        .contact {text-align: center;margin-top: 30px;}

    <div class="container">
